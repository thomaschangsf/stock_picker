# Minimal forward-proxy allowlist for SEC / EDGAR–related HTTPS.
# Extend `acl SEC` as you discover additional hostnames your tools require.
#
# Reference: specs/poc-1.md Phase 1 (Fundamental egress).

http_port 3128

# Writable by `squid` user (avoid /var/run which is root-owned on minimal images).
pid_filename /var/cache/squid/squid.pid

cache_effective_user squid
cache_effective_group squid

visible_hostname squid-fundamental

# Memory-only store (forward-proxy PoC; avoids UFS swap layout / `squid -z` disk dirs).
cache_mem 256 MB

# DNS for Squid itself (outbound from this container).
dns_nameservers 8.8.8.8 8.8.4.4

acl SSL_ports port 443
acl CONNECT method CONNECT
# `.sec.gov` matches `sec.gov` and subdomains (Squid forbids listing both `.sec.gov` and `sec.gov`).
acl SEC dstdomain .sec.gov

# Allow CONNECT tunnel only to SEC-related TLS destinations.
http_access allow CONNECT SSL_ports SEC
http_access deny CONNECT

# Allow plain HTTP to same (rare for SEC; mostly CONNECT above).
http_access allow SEC
http_access deny all
